async function analyzeSignal() {
    const btcPrice = document.getElementById('btc-price').innerText.split(' ')[3]; // Extract current BTC price
    const totalRecords = await fetch('YOUR_WEB_APP_URL'); // Fetch all records from your Web App
    const records = await totalRecords.json();

    const avgCost = calculateAverageCost(records);
    const totalBTC = records.reduce((sum, record) => sum + record.btc_amount, 0);
    const pnlPercent = calculatePNL(records); // Implement P&L calculation logic
    const monthlyTarget = await getMonthlyTarget(); // Fetch monthly target from SETTINGS sheet

    const prompt = {
        system: "You are a DCA Bitcoin trading advisor. Analyze the given market data and portfolio context. Respond ONLY in JSON format.",
        user: `BTC ราคาปัจจุบัน: ${btcPrice} THB
                ต้นทุนเฉลี่ย DCA ของฉัน: ${avgCost} THB
                กำไร/ขาดทุนปัจจุบัน: ${pnlPercent}%
                เป้าหมาย DCA รายเดือน: ${monthlyTarget} THB`
    };

    const response = await fetch('YOUR_CLAUDE_API_URL', { // Replace with your Claude API URL
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer YOUR_API_KEY' // Replace with your API key if needed
        },
        body: JSON.stringify(prompt)
    });

    const result = await response.json();
    displaySignal(result);
    saveSignalToSheet(result); // Save the signal to Google Sheets
}

function displaySignal(signal) {
    document.getElementById('ai-signal').innerText = `Signal: ${signal.signal} (Confidence: ${signal.confidence}%) - ${signal.reason}`;
}

async function saveSignalToSheet(signal) {
    const postData = {
        signal: signal.signal,
        confidence: signal.confidence,
        reason: signal.reason
    };

    await fetch('YOUR_WEB_APP_URL', { // Replace with your Web App URL
        method: 'POST',
        body: JSON.stringify(postData),
        headers: {
            'Content-Type': 'application/json'
        }
    });
}

// Helper function to calculate average cost
function calculateAverageCost(records) {
    const totalInvestment = records.reduce((sum, record) => sum + record.amount_thb, 0);
    const totalBTC = records.reduce((sum, record) => sum + record.btc_amount, 0);
    return totalBTC ? (totalInvestment / totalBTC) : 0;
}

// Helper function to get monthly target from SETTINGS
async function getMonthlyTarget() {
    const response = await fetch('YOUR_WEB_APP_URL'); // Fetch from your SETTINGS sheet
    const settings = await response.json();
    const target = settings.find(setting => setting.key === 'monthly_target');
    return target ? target.value : 0;
}
